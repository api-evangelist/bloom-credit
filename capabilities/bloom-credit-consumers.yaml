naftiko: 1.0.0-alpha2
info:
  label: Bloom Credit API — Consumers
  description: 'Bloom Credit API — Consumers. 2 operations. Lead operation: Bloom Credit Create Consumer. Self-contained Naftiko
    capability covering one Bloom Credit business surface.'
  tags:
  - Bloom Credit
  - Consumers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOM_CREDIT_API_KEY: BLOOM_CREDIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloom-credit-consumers
    baseUri: https://api.bloomcredit.io/v1
    description: Bloom Credit API — Consumers business capability. Self-contained, no shared references.
    resources:
    - name: consumers
      path: /consumers
      operations:
      - name: createconsumer
        method: POST
        description: Bloom Credit Create Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: consumers-consumer_id
      path: /consumers/{consumer_id}
      operations:
      - name: getconsumer
        method: GET
        description: Bloom Credit Get Consumer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consumer_id
          in: path
          type: string
          description: Unique identifier for the consumer.
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BLOOM_CREDIT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bloom-credit-consumers-rest
    port: 8080
    description: REST adapter for Bloom Credit API — Consumers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/consumers
      name: consumers
      description: REST surface for consumers.
      operations:
      - method: POST
        name: createconsumer
        description: Bloom Credit Create Consumer
        call: bloom-credit-consumers.createconsumer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/consumers/{consumer-id}
      name: consumers-consumer-id
      description: REST surface for consumers-consumer_id.
      operations:
      - method: GET
        name: getconsumer
        description: Bloom Credit Get Consumer
        call: bloom-credit-consumers.getconsumer
        with:
          consumer_id: rest.consumer_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloom-credit-consumers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloom Credit API — Consumers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: bloom-credit-create-consumer
      description: Bloom Credit Create Consumer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bloom-credit-consumers.createconsumer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bloom-credit-get-consumer
      description: Bloom Credit Get Consumer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloom-credit-consumers.getconsumer
      with:
        consumer_id: tools.consumer_id
      outputParameters:
      - type: object
        mapping: $.
