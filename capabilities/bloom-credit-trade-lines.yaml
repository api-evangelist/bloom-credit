naftiko: 1.0.0-alpha2
info:
  label: Bloom Credit API — Trade Lines
  description: 'Bloom Credit API — Trade Lines. 1 operations. Lead operation: Bloom Credit Get Trade Lines. Self-contained
    Naftiko capability covering one Bloom Credit business surface.'
  tags:
  - Bloom Credit
  - Trade Lines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLOOM_CREDIT_API_KEY: BLOOM_CREDIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: bloom-credit-trade-lines
    baseUri: https://api.bloomcredit.io/v1
    description: Bloom Credit API — Trade Lines business capability. Self-contained, no shared references.
    resources:
    - name: consumers-consumer_id-trade-lines
      path: /consumers/{consumer_id}/trade-lines
      operations:
      - name: gettradelines
        method: GET
        description: Bloom Credit Get Trade Lines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: consumer_id
          in: path
          type: string
          description: Unique identifier for the consumer.
          required: true
        - name: bureau
          in: query
          type: string
          description: Bureau to pull trade lines from.
        - name: account_type
          in: query
          type: string
          description: Filter by account type (revolving, installment, mortgage).
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BLOOM_CREDIT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: bloom-credit-trade-lines-rest
    port: 8080
    description: REST adapter for Bloom Credit API — Trade Lines. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/consumers/{consumer-id}/trade-lines
      name: consumers-consumer-id-trade-lines
      description: REST surface for consumers-consumer_id-trade-lines.
      operations:
      - method: GET
        name: gettradelines
        description: Bloom Credit Get Trade Lines
        call: bloom-credit-trade-lines.gettradelines
        with:
          consumer_id: rest.consumer_id
          bureau: rest.bureau
          account_type: rest.account_type
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bloom-credit-trade-lines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bloom Credit API — Trade Lines. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: bloom-credit-get-trade-lines
      description: Bloom Credit Get Trade Lines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bloom-credit-trade-lines.gettradelines
      with:
        consumer_id: tools.consumer_id
        bureau: tools.bureau
        account_type: tools.account_type
      outputParameters:
      - type: object
        mapping: $.
