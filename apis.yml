name: Bloom Credit
description: >-
  Bloom Credit is a fintech infrastructure company providing API access to consumer
  credit data from all three major credit bureaus (Equifax, Experian, TransUnion).
  The platform enables fintechs, lenders, and financial services applications to
  retrieve credit reports, credit scores, trade line data, and enroll consumers in
  real-time credit monitoring. Bloom Credit provides multi-language SDKs (Python,
  Ruby, TypeScript, R, Go) and supports the Metro 2 credit reporting format.
