  - type: Features
    data:
      - name: Tri-Bureau Credit Reports
        description: >-
          Pull full credit reports from Equifax, Experian, and TransUnion in a
          single API call with structured trade line, inquiry, and public record data.
      - name: Credit Score Retrieval
        description: >-
          Access FICO 8, VantageScore 3.0, and other scoring models from all
          three major credit bureaus for comprehensive creditworthiness assessment.
      - name: Trade Line Data
        description: >-
          Retrieve individual account and trade line records including payment
          history, balances, credit limits, and account status across bureaus.
      - name: Real-Time Credit Monitoring
        description: >-
          Enroll consumers in monitoring subscriptions that trigger webhook alerts
          for new accounts, inquiries, derogatory marks, and score changes.
      - name: Consumer Consent Management
        description: >-
          Built-in consumer registration and consent workflow ensuring FCRA-compliant
          access to credit bureau data with auditable consent records.
      - name: Multi-Language SDKs
        description: >-
          Official SDKs for Python, TypeScript, Ruby, R, and Go enabling rapid
          integration into existing fintech and data science workflows.
  - type: UseCases
    data:
      - name: Loan Underwriting
        description: >-
          Lenders pull tri-bureau credit reports and scores during loan origination
          to assess creditworthiness and determine loan terms.
      - name: Credit Building Apps
        description: >-
          Consumer fintech applications provide users with free credit score monitoring
          and personalized recommendations to improve their credit profiles.
      - name: Tenant Screening
        description: >-
          Property management platforms use Bloom Credit to run credit checks
          during rental application processing.
      - name: Credit Counseling
        description: >-
          Financial advisors and credit counselors access full credit reports and
          trade line data to create personalized debt management plans.
      - name: Account Origination
        description: >-
          Financial institutions use credit data during account opening to verify
          identity and assess risk for credit card and deposit products.
  - type: Integrations
    data:
      - name: Equifax
        description: >-
          Direct integration with Equifax for credit report and score data including
          FICO 8 and other proprietary scoring models.
      - name: Experian
        description: >-
          Direct integration with Experian for credit reports, FICO scores, and
          VantageScore data with real-time data freshness.
      - name: TransUnion
        description: >-
          Direct integration with TransUnion for credit reports and scores with
          support for TransUnion-specific data attributes.
      - name: Plaid
        description: >-
          Complementary integration where Bloom Credit's credit data can be combined
          with Plaid's bank account and income verification for full financial profiles.
