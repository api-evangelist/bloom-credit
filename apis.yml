    name: Bloom Credit API
    description: >-
      RESTful API providing access to consumer credit data from Equifax, Experian,
      and TransUnion. Supports consumer registration with consent, tri-bureau credit
      report retrieval, FICO and VantageScore credit scores, trade line data, and
      real-time credit monitoring with webhook alerts. Requires API key authentication.
